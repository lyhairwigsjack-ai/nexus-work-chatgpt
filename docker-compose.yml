services:
  nexus-work-chatgpt:
    build: .
    restart: unless-stopped
    ports:
      - "8788:8788"
    environment:
      PORT: "8788"
      DATA_DIR: /var/lib/nexus-work
      NEXUS_SYNC_TOKEN: ${NEXUS_SYNC_TOKEN}
      NEXUS_APP_KEY: ${NEXUS_APP_KEY}
    volumes:
      - nexus-work-data:/var/lib/nexus-work

volumes:
  nexus-work-data:
